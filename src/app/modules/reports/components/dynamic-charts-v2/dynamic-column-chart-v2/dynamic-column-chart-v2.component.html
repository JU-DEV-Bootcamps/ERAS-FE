@if (chartOption(); as option) {
  <apx-chart
    [chart]="option.chart!"
    [fill]="option.fill!"
    [legend]="option.legend!"
    [plotOptions]="option.plotOptions!"
    [responsive]="option.responsive!"
    [series]="option.series!"
    [title]="option.title!"
    [tooltip]="option.tooltip!"
    [xaxis]="option.xaxis!"
  ></apx-chart>
}
