<h1 class="page-title">Summary Charts</h1>
<h2 class="page-subtitle">{{ title }}</h2>
<app-poll-filters
  [showVariables]="false"
  (filters)="handleFilterSelect($event)"
></app-poll-filters>

@if (isExporting()) {
  <div class="export-overlay">
    <mat-spinner diameter="48"></mat-spinner>
    <p class="export-overlay__label">Generating PDF...</p>
  </div>
}
@if (showEmpty) {
  <app-empty-data-message
    description="Please select the required fields to generate the charts."
  />
} @else if (isLoading) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
} @else if (hasNoResults) {
  <app-empty-data-message
    description="No data found for the selected filters. Try adjusting your selection."
  />
} @else {
  <ng-container>
    <div class="action-section">
      <button
        mat-icon-button
        [disabled]="!students.length || isGeneratingPDF"
        matTooltip="Download pdf"
        (click)="exportReportPdf()"
      >
        <mat-icon>print</mat-icon>
      </button>
      <button
        matButton
        [matMenuTriggerFor]="beforeMenu"
        class="export-button"
        matTooltip="Charts"
        mat-icon-button
        color="primary"
        [disabled]="!students.length || isGeneratingPDF"
      >
        <mat-icon>bar_chart</mat-icon>
      </button>
      <mat-menu #beforeMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="toggleChart('heatmap')">
          Heatmap Chart
        </button>
        <button mat-menu-item (click)="toggleChart('chart')">
          Column Chart
        </button>
      </mat-menu>
    </div>
  </ng-container>
  <div #contentToExport>
    @if (heatmapChart) {
      <div class="chart-container">
        <apx-chart
          id="heatmap"
          [series]="chartOptions.series!"
          [chart]="chartOptions.chart!"
          [xaxis]="chartOptions.xaxis!"
          [yaxis]="chartOptions.yaxis!"
          [colors]="chartOptions.colors!"
          [plotOptions]="chartOptions.plotOptions!"
          [title]="chartOptions.title!"
          [tooltip]="chartOptions.tooltip!"
        >
        </apx-chart>
      </div>
    } @else {
      <app-summary-column-charts
        [components]="components()!"
        [pollUuid]="pollUuid"
        [cohortsIds]="cohortIds"
        [data]="title"
      ></app-summary-column-charts>
    }
    <div id="table-container">
      <app-list
        (actionCalled)="(null)"
        (loadCalled)="getStudentsByCohortAndPoll($event)"
        (exporting)="onExporting($event)"
        [items]="students"
        [totalItems]="totalStudents"
        [columns]="columns"
        [actionDatas]="[]"
        [title]="'Students Risk'"
        [showExportDropdown]="true"
        [allItems]="allStudents"
      />
    </div>
  </div>
}
