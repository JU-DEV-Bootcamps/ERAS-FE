<h1 class="page-title">Dynamic Charts</h1>
<h2 class="page-subtitle">{{ title }}</h2>
<app-poll-filters (filters)="handleFilterSelect($event)"></app-poll-filters>

@if (showEmpty) {
  <app-empty-data-message
    description="Please select the required fields to generate the charts."
  />
} @else if (isLoading) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
} @else if (hasNoResults) {
  <app-empty-data-message
    description="No data found for the selected filters. Try adjusting your selection."
  />
} @else {
  @defer {
    <div class="charts-area">
      <div class="action-section">
        <ng-container>
          <div class="action-section">
            <button
              id="print-button"
              class="export-button"
              matTooltip="Download pdf"
              mat-icon-button
              color="primary"
              [disabled]="!chartsOptions.length || isGeneratingPDF"
              (click)="exportReportPdf()"
            >
              <mat-icon>print</mat-icon>
            </button>
            <button
              matButton
              [matMenuTriggerFor]="beforeMenu"
              class="export-button"
              matTooltip="Charts"
              mat-icon-button
              color="primary"
              [disabled]="!chartsOptions.length || isGeneratingPDF"
            >
              <mat-icon>bar_chart</mat-icon>
            </button>
            <mat-menu #beforeMenu="matMenu" xPosition="before">
              <button mat-menu-item (click)="toggleChart('heatmap')">
                Heatmap Chart
              </button>
              <button mat-menu-item (click)="toggleChart('chart')">
                Column Chart
              </button>
            </mat-menu>
          </div>
        </ng-container>
      </div>
    </div>
    <div class="charts-layout" [class.panel-open]="isPanelOpen()">
      @if (heatmapChart) {
        <div
          class="charts-area-wrapper"
          [class.has-expanded-card]="isAnyCardExpanded"
        >
          <div
            #contentToExport
            class="charts-grid"
            [style.height.px]="isAnyCardExpanded ? gridHeight : null"
          >
            @for (chartOption of chartsOptions; track $index) {
              <app-expandable-card
                #chartsGrid
                [cardId]="'chart-' + $index"
                [expanded]="expandedId === 'chart-' + $index"
                [dimmed]="
                  expandedId !== null && expandedId !== 'chart-' + $index
                "
                (toggleExpand)="onToggle($event)"
              >
                <div [appApexTooltip]="getTooltipFn($index)">
                  <apx-chart
                    [series]="chartOption.series!"
                    [chart]="chartOption.chart!"
                    [xaxis]="chartOption.xaxis!"
                    [yaxis]="chartOption.yaxis!"
                    [colors]="chartOption.colors!"
                    [plotOptions]="chartOption.plotOptions!"
                    [title]="chartOption.title!"
                    [tooltip]="chartOption.tooltip!"
                    [legend]="chartOption.legend!"
                  >
                  </apx-chart>
                </div>
              </app-expandable-card>
            }
          </div>
        </div>
      } @else {
        <div #contentToExport>
          <app-dynamic-column-chart
            [components]="components()!"
            [identifier]="uuid!"
            [cohortsIds]="cohortIds"
            [evaluationId]="evaluationId"
          >
          </app-dynamic-column-chart>
        </div>
      }
      @if (isPanelOpen()) {
        <aside class="details-aside">
          <app-details-panel
            [data]="selectedPanelData()"
            (closed)="closePanel()"
          />
        </aside>
      }
    </div>
  }
}
