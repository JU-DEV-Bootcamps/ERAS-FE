@if (kpi !== null) {
  <mat-grid-list [cols]="gridColumns()" rowHeight="200px" gutterSize="30px">
    <mat-grid-tile>
      <app-stats-card-v2
        [title]="'Number of Students'"
        [value]="kpi.body.totalStudents.value"
        [percentageChange]="kpi.body.totalStudents.percentageChange"
      >
        <ng-container icon>
          <img src="assets/icons/studentsIcon.svg" alt="students" />
        </ng-container>
      </app-stats-card-v2>
    </mat-grid-tile>

    <mat-grid-tile>
      <app-stats-card-v2
        [title]="'Polls Answered'"
        [value]="kpi.body.totalPollsAnswered.value"
        [percentageChange]="kpi.body.totalPollsAnswered.percentageChange"
      >
        <ng-container icon>
          <img src="assets/icons/pollsIcon.png" alt="polls" />
        </ng-container>
      </app-stats-card-v2>
    </mat-grid-tile>

    <mat-grid-tile>
      <app-stats-card-v2
        [title]="'Evaluations'"
        [value]="kpi.body.totalEvaluations.value"
        [percentageChange]="kpi.body.totalEvaluations.percentageChange"
      >
        <ng-container icon>
          <img src="assets/icons/evaluationsIcon.png" alt="evaluations" />
        </ng-container>
      </app-stats-card-v2>
    </mat-grid-tile>
  </mat-grid-list>
}
