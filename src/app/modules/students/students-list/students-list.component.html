@if (isLoading) {
  <mat-spinner />
} @else {
  <div class="buttons-container">
    <app-eras-button
      class="light-button"
      [textButton]="'Import'"
      [iconButton]="'download'"
      (clickButton)="openImportModal()"
    ></app-eras-button>
    @if (students.length > 0) {
      <app-eras-button
        [matMenuTriggerFor]="menu"
        class="light-button"
        [textButton]="'Export'"
        [iconButton]="'upload'"
      >
      </app-eras-button>
      <mat-menu #menu="matMenu">
        <button
          mat-menu-item
          class="export-option-button"
          [disabled]="isGenerating"
          (click)="exportToCSV()"
        >
          To CSV
        </button>
        <button
          id="print-button"
          mat-menu-item
          class="export-option-button"
          [disabled]="isGenerating"
          (click)="exportToPdf()"
        >
          To PDF
        </button>
      </mat-menu>
    }
    <app-eras-button
      [textButton]="'New Student'"
      [iconButton]="'add'"
    ></app-eras-button>
  </div>

  <app-list
    (loadCalled)="handleLoadCalled($event)"
    (actionCalled)="handleActionCalled($event)"
    [columns]="columns"
    [items]="students"
    [totalItems]="totalStudents"
    [actionDatas]="actionDatas"
    [itemsAreSelectable]="itemsAreSelectable"
    [externalExport]="true"
  >
  </app-list>
}
