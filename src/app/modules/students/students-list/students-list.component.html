<div class="page-header">
  <h2 class="page-title">Students</h2>
</div>

<app-list
  (loadCalled)="handleLoadCalled($event)"
  (actionCalled)="handleActionCalled($event)"
  [columns]="columns"
  [items]="students"
  [totalItems]="totalStudents"
  [actionDatas]="actionDatas"
  [itemsAreSelectable]="itemsAreSelectable"
>
  <ng-template #isSelected let-element>
    <app-selected-checkbox [element]="element" />
  </ng-template>
</app-list>
