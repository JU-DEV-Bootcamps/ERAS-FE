<h2 mat-dialog-title class="dialog-title">
  Assessment Details
  <button
    mat-icon-button
    class="close-btn"
    aria-label="Close"
    (click)="onClose()"
  >
    <mat-icon>close</mat-icon>
  </button>
</h2>

<mat-divider></mat-divider>

<mat-dialog-content class="dialog-content">
  <div class="field-group">
    <span class="field-label">Student:</span>
    <span class="field-value">{{ data.studentDisplay }}</span>
  </div>

  <div class="field-group">
    <span class="field-label">Status:</span>
    <div class="field-value">
      <app-assessment-status-badge [status]="data.status" />
    </div>
  </div>

  <div class="field-group">
    <span class="field-label">Service:</span>
    <span class="field-value">{{ data.service || '—' }}</span>
  </div>

  <div class="field-group">
    <span class="field-label">Professional:</span>
    <span class="field-value">{{ data.assignedProfessional || '—' }}</span>
  </div>

  <div class="field-group">
    <span class="field-label">Submitter:</span>
    <span class="field-value">{{ data.createdBy || '—' }}</span>
  </div>

  <div class="field-group">
    <span class="field-label">Comment:</span>
    <span class="field-value">{{ data.comments || '—' }}</span>
  </div>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button
    mat-flat-button
    class="create-intervention-btn"
    type="button"
    (click)="onCreateIntervention()"
  >
    Create Intervention
  </button>
</mat-dialog-actions>
