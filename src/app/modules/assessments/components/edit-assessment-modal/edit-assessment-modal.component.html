<div class="modal-header">
  <h2 mat-dialog-title>Edit Assessment</h2>
  <mat-icon mat-dialog-close>close</mat-icon>
</div>
<div class="modal-content">
  <mat-dialog-content>
    <app-form-factory
      [fields]="formFields"
      (formReady)="setFormGroup($event)"
    ></app-form-factory>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button mat-dialog-close class="cancel-button">Cancel</button>
    <button
      class="action-button"
      type="submit"
      [ngClass]="{
        'disabled-button': form.invalid || form.pristine || !formHasChanges(),
      }"
      [disabled]="form.invalid || form.pristine || !formHasChanges()"
      (click)="submitAssessment()"
    >
      Edit
    </button>
  </mat-dialog-actions>
</div>
