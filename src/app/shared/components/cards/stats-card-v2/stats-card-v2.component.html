<mat-card class="stat-card">
  <div class="kpi-information">
    <span class="title">{{ title() }}</span>
    <div class="numeric-section">
      <span class="value-quantity">{{ value() }}</span>
      <span
        class="value-percentage"
        [ngClass]="isPositive() ? 'positive' : 'negative'"
      >
        {{ formattedPercentage() }}
      </span>
      >
    </div>
  </div>
  <ng-content select="[icon]"></ng-content>
</mat-card>
