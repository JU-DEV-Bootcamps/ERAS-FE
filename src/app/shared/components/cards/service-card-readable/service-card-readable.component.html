<div *ngFor="let service of serviceCards">
  <div class="card">
    <div class="graphic-status">
      <div class="graphic">
        <img src="assets/icons/serviceIcon.svg" alt="service icon" />
      </div>
      <div class="status">
        <app-chip
          [text]="service.isActive ? 'ACTIVE' : 'INACTIVE'"
          [status]="service.isActive ? 'success' : 'error'"
        ></app-chip>
      </div>
    </div>
    <div class="details">
      <div class="title-service">{{ service.configurationName }}</div>
      <div class="more-info">
        <span>Service: {{ service.serviceProviderName }}</span>
        <span>Created by: {{ service.createdBy }}</span>
      </div>
    </div>
  </div>
</div>
