<app-select-multiple-virtual-scroll
  [control]="fieldControl()"
  [items]="items()"
  [label]="field().label"
  [floatLabelSetup]="field().floatingLabel ?? 'auto'"
  [placeholder]="field().placeholder ?? 'Select...'"
  [autoSelect]="false"
  [displayMode]="'chips'"
></app-select-multiple-virtual-scroll>
